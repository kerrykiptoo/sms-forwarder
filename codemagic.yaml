workflows:
  android-debug:
    name: Build Debug APK
    max_build_duration: 30
    environment:
      java: 17
    scripts:
      - name: Show repo layout
        script: |
          echo "=== repo root: $CM_BUILD_DIR ==="
          ls -la "$CM_BUILD_DIR"
          echo "=== settings.gradle.kts content ==="
          cat "$CM_BUILD_DIR/settings.gradle.kts" || echo "NO settings.gradle.kts AT ROOT"
          echo "=== root build.gradle.kts content ==="
          cat "$CM_BUILD_DIR/build.gradle.kts" || echo "NO build.gradle.kts AT ROOT"
          echo "=== app/build.gradle.kts content ==="
          cat "$CM_BUILD_DIR/app/build.gradle.kts" || echo "NO app/build.gradle.kts"
          echo "=== full file tree (no .git) ==="
          find "$CM_BUILD_DIR" -not -path '*/.git/*' -type f | sort
      - name: Generate Gradle wrapper
        script: |
          set -e
          mkdir -p /tmp/wrapgen
          printf 'rootProject.name = "wrapgen"\n' > /tmp/wrapgen/settings.gradle.kts
          ( cd /tmp/wrapgen && gradle wrapper --gradle-version 8.7 --no-daemon )
          cp -R /tmp/wrapgen/gradle "$CM_BUILD_DIR/gradle"
          cp /tmp/wrapgen/gradlew "$CM_BUILD_DIR/gradlew"
          chmod +x "$CM_BUILD_DIR/gradlew"
      - name: Build debug APK
        script: |
          set -e
          cd "$CM_BUILD_DIR"
          ./gradlew assembleDebug --stacktrace --no-daemon
    artifacts:
      - app/build/outputs/apk/**/*.apk
    publishing:
      email:
        recipients:
          - kerrykip2020@gmail.com
        notify:
          success: true
          failure: true