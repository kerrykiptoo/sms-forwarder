workflows:
  android-debug:
    name: Build Debug APK
    max_build_duration: 30
    environment:
      java: 17
    scripts:
      - name: Generate Gradle wrapper
        script: |
          set -e
          mkdir -p /tmp/wrapgen
          printf 'rootProject.name = "wrapgen"\n' > /tmp/wrapgen/settings.gradle.kts
          echo "=== temp dir contents before wrapper ==="
          ls -la /tmp/wrapgen
          ( cd /tmp/wrapgen && gradle wrapper --gradle-version 8.7 --no-daemon )
          echo "=== temp dir contents after wrapper ==="
          ls -la /tmp/wrapgen
          cp -R /tmp/wrapgen/gradle "$CM_BUILD_DIR/gradle"
          cp /tmp/wrapgen/gradlew "$CM_BUILD_DIR/gradlew"
          chmod +x "$CM_BUILD_DIR/gradlew"
          echo "=== repo root after copy ==="
          ls -la "$CM_BUILD_DIR"
      - name: Build debug APK
        script: |
          set -e
          cd "$CM_BUILD_DIR"
          ./gradlew assembleDebug --stacktrace --no-daemon
    artifacts:
      - app/build/outputs/apk/**/*.apk
    publishing:
      email:
        recipients:
          - kerrykip2020@gmail.com
        notify:
          success: true
          failure: true