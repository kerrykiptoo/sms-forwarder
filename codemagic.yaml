workflows:
  android-debug:
    name: Build Debug APK
    max_build_duration: 30
    environment:
      java: 17
    scripts:
      - name: Generate Gradle wrapper (isolated)
        script: |
          # Generate the wrapper in a temp dir that has a MINIMAL, plugin-free
          # Gradle build, so wrapper creation never evaluates the Android plugins.
          mkdir -p /tmp/wrapgen
          cd /tmp/wrapgen
          echo "rootProject.name = \"wrapgen\"" > settings.gradle.kts
          gradle wrapper --gradle-version 8.7 --no-daemon
          # Copy the generated wrapper into the real repo root.
          cp -R /tmp/wrapgen/gradle "$CM_BUILD_DIR/gradle"
          cp /tmp/wrapgen/gradlew "$CM_BUILD_DIR/gradlew"
          cp /tmp/wrapgen/gradlew.bat "$CM_BUILD_DIR/gradlew.bat" || true
          chmod +x "$CM_BUILD_DIR/gradlew"
      - name: Build debug APK
        script: |
          cd "$CM_BUILD_DIR"
          ./gradlew assembleDebug --stacktrace --no-daemon
    artifacts:
      - app/build/outputs/apk/**/*.apk
    publishing:
      email:
        recipients:
          - kerrykip2020@gmail.com
        notify:
          success: true
          failure: true